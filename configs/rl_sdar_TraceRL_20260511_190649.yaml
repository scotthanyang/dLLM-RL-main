  gradient_checkpointing_enable: true
  gradient_accumulation_steps: 32
  batch_size_lm: 2
  mixed_precision: bf16
  enable_tf32: true
  seed: 10086
  num_train_epochs: 1
  max_grad_norm: 1.0
  method: TraceRL
  block_size: 4
  shrink: 1
  post_num: 0
  max_gen_length: 2000
  max_prompt_len: 784
  lower_p: 0.1
  upper_p: 0.9
  eps: 0.2
  beta: 0.01
  use_kl_estimator_k3: true
optimizer:
  name: adamw
  params:
    learning_rate: 1.0e-06
    scale_lr: false
    beta1: 0.9
    beta2: 0.999
    weight_decay: 0.0
    epsilon: 1.0e-08
lr_scheduler:
  scheduler: cosine
  params:
    learning_rate: 1.0e-06
    warmup_steps: 0
    min_lr_scale: 1.0
evaluation:
  eval_dataset: MATH500
  data_type: math
  tensor_parallel_size: 1
  max_active: 16
  num_response_per_task: 3
