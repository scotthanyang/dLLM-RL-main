wandb:
  entity: null
  resume: auto
experiment:
  project: rl_sdar_TraceRL_20260511_190649
  function: train
  start_from_scratch: true
  total_step: 80
  save_every: 10
  eval_every: 10
  current_epoch: 1
  deepspeed_file: 1_node_1_gpus_deepspeed_zero2
  num_node: 1
  node_index: 0
  main_process_port: 24932
  checkpoints_total_limit: 2
model:
  pretrained_model: /storage/project/r-phentenryck3-0/mli746/hf_models/JetLM/SDAR-8B-Chat-b32
  optimized_name: optimized_TraceRL
  model_base: sdar
dataset:
  train_dataset: MATH_train
  optimization_data: rl_data
  data_type: math
rollout:
  tensor_parallel_size: 1
  max_active: 64
  num_task_per_step: 16
  num_response_per_task: 8
  temperature: 1.0
  max_token: 2000
  block_size: 32
  denoising_steps_per_block: 32
  top_p: 1.0
  top_k: 0
  remasking_strategy: low_confidence_dynamic
  dynamic_threshold: 0.9
