  block_size: 4
  denoising_steps_per_block: 32
  top_p: 1.0
  top_k:
  - 0
  - 1
  remasking_strategy:
  - low_confidence_dynamic
  - low_confidence_static
  dynamic_threshold: 0.9
  start_with_think: false
