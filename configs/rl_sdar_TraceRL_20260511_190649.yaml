  length_penalty_power: 2.0
  length_penalty_cap: 1.0
  length_penalty_apply_to_all_samples: true
  hard_overlong_invalidate: true
  hard_overlong_margin: 5
  group_filter_enable: true
  group_filter_min_success: 0.2
  group_filter_max_success: 0.8
  correctness_lower_bound: 0.01
  correctness_upper_bound: 0.99
